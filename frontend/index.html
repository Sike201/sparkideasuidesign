  <!-- Manifest is picked based on the initial pathname so the mini-app
       ( /mini-app/* ) installs with `start_url=/mini-app/` + `scope=/mini-app/`,
       while the rest of justspark.fun installs with the global manifest.

       MUST run before React mounts — Chrome Android snapshots the manifest
       at `beforeinstallprompt` time, which fires almost immediately on page
       load, well before Helmet can swap the tag. Swapping client-side via
       react-helmet-async was too late.

       We REMOVE any pre-existing `<link rel="manifest">` first because
       vite-plugin-pwa auto-injects one at build time pointing at the global
       `/manifest.webmanifest`. If we just append a second tag, browsers
       use the FIRST one in document order — so on `/mini-app/*` the global
       manifest would win, `scope` would be `/` not `/mini-app/`, and
       Android Chrome would refuse to fire `beforeinstallprompt` for the
       mini-app (or worse, install the user as the global Spark instead).
  -->
  <script>
    (function () {
      var path = window.location.pathname || "/";
      var isMini = path === "/mini-app" || path.indexOf("/mini-app/") === 0;
      var existing = document.querySelectorAll('link[rel="manifest"]');
      for (var i = 0; i < existing.length; i++) {
        existing[i].parentNode.removeChild(existing[i]);
      }
      var link = document.createElement("link");
      link.rel = "manifest";
      link.href = isMini ? "/manifest-mini.webmanifest" : "/manifest.webmanifest";
      document.head.appendChild(link);
    })();
  </script>
